{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Cuestionario de Demostración</h2>
    <form action="{{ url_for('calificar_quiz') }}" method="POST">
        {% for p in preguntas %}
        <div class="pregunta-block">
            <p><strong>{{ loop.index }}. {{ p.pregunta }}</strong></p>
            <label><input type="radio" name="pregunta_{{ p.id }}" value="A" required> {{ p.opcion_a }}</label><br>
            <label><input type="radio" name="pregunta_{{ p.id }}" value="B"> {{ p.opcion_b }}</label><br>
            <label><input type="radio" name="pregunta_{{ p.id }}" value="C"> {{ p.opcion_c }}</label><br>
            <label><input type="radio" name="pregunta_{{ p.id }}" value="D"> {{ p.opcion_d }}</label>
        </div>
        <hr>
        {% endfor %}
        <button type="submit" class="btn-primary">Enviar Respuestas</button>
    </form>
</div>
{% endblock %}
