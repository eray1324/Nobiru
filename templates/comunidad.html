{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Comunidad de Aprendizaje Nobiru</h2>
    <form method="POST">
        <label>¿Qué quieres compartir hoy?</label>
        <textarea name="contenido" required placeholder="Escribe tu duda o consejo para el examen..." style="width:100%; background:#0f0e17; color:white; border-radius:6px; padding:10px;"></textarea>
        
        <label>Tipo de publicación</label>
        <select name="tipo" style="width:100%; padding:10px; margin-top:5px; background:#0f0e17; color:white;">
            <option value="Pregunta">❓ Crear Pregunta</option>
            <option value="Consejo">💡 Publicar Consejo</option>
        </select>
        <button type="submit" class="btn-primary">Publicar en el Foro</button>
    </form>
</div>

<h3>Publicaciones Recientes</h3>
{% for post in posts %}
<div class="card" style="border-left: 4px solid var(--accent-purple);">
    <p><span style="color:var(--accent-orange);">{{ post.autor }}</span> • <small>{{ post.fecha }}</small></p>
    <p><strong>[{{ post.tipo }}]</strong> {{ post.contenido }}</p>
    <button class="btn-primary" style="width:auto; display:inline-block; margin-right:5px; padding: 5px 15px;">💬 Responder</button>
    <button class="btn-primary" style="width:auto; display:inline-block; background:#333; padding: 5px 15px;">Editar</button>
</div>
{% empty %}
<p>No hay publicaciones aún. ¡Sé el primero!</p>
{% endfor %}
{% endblock %}
