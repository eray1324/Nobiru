{% extends 'base.html' %}
{% block content %}
<div class="welcome-header">
    <h1>Bienvenido a Nobiru</h1>
    <div class="card quote-card">
        <p class="quote">"{{ frase }}"</p>
    </div>
</div>

<div class="dashboard-grid">
    <div class="card profile-card">
        <h3>Tu Perfil</h3>
        <p><strong>Usuario:</strong> {{ usuario.username }}</p>
        <p><strong>Puntos totales:</strong> {{ usuario.puntos }} XP</p>
    </div>

    <div class="card insignia-card">
        <h3>Tu Insignia Actual</h3>
        <div class="badge-visual {{ usuario.insignia.lower() }}">
            {{ usuario.insignia }}
        </div>
        <p>Sigue respondiendo quizes para ascender de rango.</p>
    </div>
</div>
{% endblock %}
